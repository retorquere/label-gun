name: 'Label-gun'
description: 'Manage issue triage state and evidence requirements'
author: 'Emiliano Heyns'
inputs:
  token:
    required: true
    description: GitHub token for issue operations
  'project-token':
    required: false
    description: Optional token for GitHub Project updates when the default token lacks access
  config:
    required: false
    description: Inline YAML configuration override
  'config-path':
    required: false
    default: .github/label-gun.yml
    description: Repository config path
  verbose:
    required: false
    description: Enable verbose logging
  assign:
    required: false
    description: Assign issues to maintainers on maintainer interaction
  label-awaiting:
    required: false
    default: awaiting-user-feedback
    description: Label issues that require user feedback to proceed
  label-active:
    required: false
    description: Only act on issues with this tag
  label-exempt:
    required: false
    description: Ignore issues with this tag
  label-reopened:
    required: false
    description: Label to apply when a closed issue is reopened by new user activity
  label-blocked:
    required: false
    description: Comma-separated labels for blocked issues
  label-canclose:
    required: false
    description: Comma-separated labels that allow users to close issues without reopening
  close-message:
    required: false
    description: Comment posted when a user closes an issue that should remain open
  log-regex:
    required: false
    description: Legacy regex for required debug-log evidence
  log-message:
    required: false
    description: Legacy comment posted when required evidence is missing
  log-label:
    required: false
    description: Legacy label for missing required evidence
  project-url:
    required: false
    description: GitHub Project URL to sync issue status into
  project-field-status:
    required: false
    default: Status
    description: Project field name for status
  project-field-end-date:
    required: false
    default: End date
    description: Project field name for last-active date
  project-field-users:
    required: false
    default: Users
    description: Project field name for active users
  project-status-blocked:
    required: false
    default: Blocked
    description: Output and project status name for blocked issues
  project-status-awaiting:
    required: false
    default: Awaiting user input
    description: Output and project status name for issues awaiting feedback
  project-status-in-progress:
    required: false
    default: In progress
    description: Output and project status name for in-progress issues
  project-status-new:
    required: false
    default: To triage
    description: Output and project status name for new issues
  project-status-backlog:
    required: false
    default: Backlog
    description: Output and project status name for backlog issues
outputs:
  issue:
    description: Issue number
  status:
    description: Issue status name
  users:
    description: Non-maintainer users active on the issue
  lastactive:
    description: Last active date on the issue
runs:
  using: 'node20'
  main: 'dist/index.js'
branding:
  icon: tag
  color: gray-dark